# Required modules for Kubernetes nodes
# /etc/modules-load.d/99-kubernetes.conf

# Overlay filesystem driver for container runtimes
overlay

# Bridge Netfilter to enable iptables filtering on bridged interfaces
br_netfilter

# Connection tracking for netfilter (essential for kube-proxy / network policies)
nf_conntrack

# BPF kernel features (essential for Cilium)
xt_socket

# TCP BBR congestion control components
tcp_bbr
sch_fq
