# kernel and network tuning config for kubernetes and cilium
# /etc/sysctl.d/99-kubernetes.conf

# Allow IPv4 and IPv6 forwarding (required for k8s and Cilium)
net.ipv4.ip_forward=1
net.ipv6.conf.all.forwarding=1
net.ipv6.conf.default.forwarding=1

# Bridge netfilter options (let iptables/ip6tables process bridged traffic)
net.bridge.bridge-nf-call-iptables=1
net.bridge.bridge-nf-call-ip6tables=1
net.bridge.bridge-nf-call-arptables=1

# Increase system-wide file descriptor limit
fs.file-max=2097152

# Increase max user watches for inotify (important for systemd/pods)
fs.inotify.max_user_watches=524288
fs.inotify.max_user_instances=8192

# Virtual memory tuning: k8s recommendation for swapoff and low memory situations
vm.overcommit_memory=1
vm.panic_on_oom=0

# Cilium specific requirements and tuning (eBPF map limits, ARP resolution)
# Increase size of arp tables for large numbers of pods/nodes
net.ipv4.neigh.default.gc_thresh1=1024
net.ipv4.neigh.default.gc_thresh2=2048
net.ipv4.neigh.default.gc_thresh3=4096

net.ipv6.neigh.default.gc_thresh1=1024
net.ipv6.neigh.default.gc_thresh2=2048
net.ipv6.neigh.default.gc_thresh3=4096

# Enable TCP BBR congestion control for better network efficiency (if modules loaded)
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr

# Adjust socket receive and send buffer sizes for high throughput
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.ipv4.tcp_rmem=4096 87380 16777216
net.ipv4.tcp_wmem=4096 65536 16777216

# Disable source routing and redirects (Cilium handles routing)
net.ipv4.conf.all.accept_redirects=0
net.ipv4.conf.default.accept_redirects=0
net.ipv4.conf.all.secure_redirects=0
net.ipv4.conf.default.secure_redirects=0
net.ipv4.conf.all.send_redirects=0
net.ipv4.conf.default.send_redirects=0
